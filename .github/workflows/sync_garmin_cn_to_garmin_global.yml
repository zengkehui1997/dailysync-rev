name: Sync Garmin CN to Garmin Global

on:
  workflow_dispatch:
  schedule:
    # GitHub cron 使用 UTC 时间；北京时间/台北时间 08:00 和 20:00
    - cron: "0 */12 * * *"

env:
  RQ_COOKIE: ${{ secrets.RQ_COOKIE }}
  RQ_CSRF_TOKEN: ${{ secrets.RQ_CSRF_TOKEN }}
  RQ_USERID: ${{ secrets.RQ_USERID }}
  GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
  GOOGLE_API_CLIENT_EMAIL: ${{ secrets.GOOGLE_API_CLIENT_EMAIL }}
  GOOGLE_API_PRIVATE_KEY: ${{ secrets.GOOGLE_API_PRIVATE_KEY }}
  BARK_KEY: ${{ secrets.BARK_KEY }}

  GARMIN_USERNAME: ${{ secrets.GARMIN_USERNAME }}
  GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
  GARMIN_GLOBAL_USERNAME: ${{ secrets.GARMIN_GLOBAL_USERNAME }}
  GARMIN_GLOBAL_PASSWORD: ${{ secrets.GARMIN_GLOBAL_PASSWORD }}

  GARMIN_CN_OAUTH1: ${{ secrets.GARMIN_CN_OAUTH1 }}
  GARMIN_CN_OAUTH2: ${{ secrets.GARMIN_CN_OAUTH2 }}
  GARMIN_GLOBAL_OAUTH1: ${{ secrets.GARMIN_GLOBAL_OAUTH1 }}
  GARMIN_GLOBAL_OAUTH2: ${{ secrets.GARMIN_GLOBAL_OAUTH2 }}

concurrency:
  group: sync-garmin-cn-to-global
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    name: Sync Garmin CN to Garmin Global
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Check Garmin session secrets
        run: |
          test -n "$GARMIN_CN_OAUTH1" || (echo "GARMIN_CN_OAUTH1 is missing" && exit 1)
          test -n "$GARMIN_CN_OAUTH2" || (echo "GARMIN_CN_OAUTH2 is missing" && exit 1)
          test -n "$GARMIN_GLOBAL_OAUTH1" || (echo "GARMIN_GLOBAL_OAUTH1 is missing" && exit 1)
          test -n "$GARMIN_GLOBAL_OAUTH2" || (echo "GARMIN_GLOBAL_OAUTH2 is missing" && exit 1)

      - name: Sync Garmin CN to Garmin Global
        run: yarn sync_cn
        timeout-minutes: 5